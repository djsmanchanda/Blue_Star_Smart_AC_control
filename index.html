<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AC Control</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Local tray service</p>
          <h1>AC Control</h1>
        </div>
        <button id="refresh" type="button">Reload config</button>
      </header>

      <section class="status-band" aria-live="polite">
        <span class="signal-dot" aria-hidden="true"></span>
        <span id="service-status">Starting...</span>
      </section>

      <section id="ac-panel" class="ac-panel" aria-label="AC controls"></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
